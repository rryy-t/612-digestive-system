<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Malgun Gothic', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      height: 100vh;
      height: -webkit-fill-available;
      box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
    }

    h1 { font-size: 1.1rem; margin: 2px 0; }
    p { font-size: 0.75rem; margin: 0 0 4px 0; color: #94a3b8; }

    #game-header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 460px;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 8px;
      border-bottom: 2px solid #334155;
      box-sizing: border-box;
    }
    #stage-display { color: #a855f7; } 
    #score-display { color: #38bdf8; }
    #hp-display { color: #f43f5e; }

    #combo-pouch {
      margin: 4px 0;
      min-height: 30px;
      background: #1e293b;
      width: 100%;
      max-width: 460px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: bold;
      border: 1px solid #475569;
      box-sizing: border-box;
    }
    .combo-badge { background: #38bdf8; color: #0f172a; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }

    #game-canvas {
      position: relative;
      width: 100%;
      max-width: 460px;
      flex: 1;
      max-height: 40vh;
      background: linear-gradient(to bottom, #1e293b, #0f172a 80%, #1e3a8a);
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #334155;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    .falling-nut {
      position: absolute;
      padding: 5px 10px;
      background-color: #ffffff;
      color: #0f172a;
      font-weight: 900;
      font-size: 12px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(255,255,255,0.3);
      white-space: nowrap;
      z-index: 10;
    }

    #ocean-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: #0284c7;
      border-top: 3px solid #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 20;
    }

    #word-pad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 460px;
      padding-bottom: 8px; 
      box-sizing: border-box;
      z-index: 50;
      margin-top: auto;
    }

    .word-card {
      background-color: #334155;
      color: #e2e8f0;
      padding: 12px 0;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 3px 0 #1e293b;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .word-card.selected {
      background-color: #38bdf8;
      color: #0f172a;
      box-shadow: none;
      transform: translateY(3px);
    }

    #game-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
    }
    
    /* 🛠️ 버튼이 터치 이벤트를 명확히 받도록 가시성 및 터치 영역 수정 */
    .start-btn {
      padding: 12px 35px; font-size: 16px; font-weight: bold;
      background-color: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      z-index: 110;
    }
  </style>
</head>
<body>

  <h1>소화관 베네치아 방어전 🌊</h1>
  <p>영양소가 바다에 닿기 전 파괴하세요!</p>

  <div id="game-header">
    <div id="stage-display">STAGE: 1</div>
    <div id="score-display">SCORE: 0</div>
    <div id="hp-display">LIFE: ❤️❤️❤️❤️❤️</div>
  </div>

  <div id="combo-pouch">
    <span style="color:#38bdf8;">⚠️ [장소 ➔ 소화액 ➔ 효소] 순서대로 터치하세요!</span>
  </div>

  <div id="game-canvas">

    <div id="game-overlay">

      <button class="start-btn" id="btn-game-start" ontouchstart="realGameStart();" onclick="realGameStart();">게임 시작 (START)</button>
    </div>
  </div>

    <div class="word-card" data-word="위" ontouchstart="handleCardClick(this);" onclick="handleCardClick(this);">위</div>
    
    <div class="word-card" data-word="위액" ontouchstart="handleCardClick(this);" onclick="handleCardClick(this);">위액</div>
    <div class="word-card" data-word="펩신" ontouchstart="handleCardClick(this);" onclick="handleCardClick(this);">펩신</div>

    <div class="word-card" data-word="이자액" ontouchstart="handleCardClick(this);" onclick="handleCardClick(this);">이자액</div>
    
    <div class="word-card" data-word="트립신" ontouchstart="handleCardClick(this);" onclick="handleCardClick(this);">트립신</div>
