<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Malgun Gothic', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 6px; /* 패딩 축소 */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      height: 100vh;
      height: -webkit-fill-available; /* iOS/iPadOS 뷰포트 오류 방지 */
      box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
    }

    /* 타이틀 크기 축소 */
    h1 { font-size: 1.2rem; margin: 4px 0 2px 0; }
    p { font-size: 0.8rem; margin: 0 0 4px 0; color: #94a3b8; }

    #game-header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 460px; /* 전체 최대 폭 살짝 축소 */
      font-size: 13px; /* 폰트 축소 */
      font-weight: bold;
      padding: 6px 8px;
      border-bottom: 2px solid #334155;
      box-sizing: border-box;
    }
    #stage-display { color: #a855f7; } 
    #score-display { color: #38bdf8; }
    #hp-display { color: #f43f5e; }

    #combo-pouch {
      margin: 5px 0;
      min-height: 32px; /* 높이 축소 */
      background: #1e293b;
      width: 100%;
      max-width: 460px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px; /* 폰트 축소 */
      font-weight: bold;
      border: 1px solid #475569;
      box-sizing: border-box;
    }
    .combo-badge { background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }

    #game-canvas {
      position: relative;
      width: 100%;
      max-width: 460px;
      flex: 1;
      background: linear-gradient(to bottom, #1e293b, #0f172a 80%, #1e3a8a);
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #334155;
      box-sizing: border-box;
      margin-bottom: 6px;
    }

    .falling-nut {
      position: absolute;
      padding: 6px 12px; /* 크기 축소 */
      background-color: #ffffff;
      color: #0f172a;
      font-weight: 900;
      font-size: 12px; /* 영양소 글씨 크기 축소 */
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(255,255,255,0.3);
      white-space: nowrap;
      z-index: 10;
    }

    #ocean-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35px; /* 바다 높이 감소 */
      background: #0284c7;
      border-top: 3px solid #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 20;
    }

    #word-pad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px; /* 간격 축소 */
      width: 100%;
      max-width: 460px;
      padding-bottom: 6px; /* 하단 여백 축소 */
      box-sizing: border-box;
      z-index: 50;
    }

    .word-card {
      background-color: #334155;
      color: #e2e8f0;
      padding: 10px 0; /* 단어 버튼 세로 크기 줄임 */
      font-size: 12px; /* 폰트 살짝 축소 */
      font-weight: bold;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 3px 0 #1e293b;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .word-card.selected {
      background-color: #38bdf8;
      color: #0f172a;
      box-shadow: none;
      transform: translateY(3px); /* 눌린 효과 유지 */
    }

    #game-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 12px;
      padding: 15px;
      box-sizing: border-box;
    }
    .start-btn {
      padding: 12px 40px; font-size: 16px; font-weight: bold;
      background-color: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

  <p>영양소가 바다에 닿기 전 파괴하세요!</p>

  </div>

  <div id="combo-pouch">
    <span style="color:#38bdf8;">⚠️ [장소 ➔ 소화액 ➔ 효소] 순서대로 터치하세요!</span>
  </div>

  <div id="game-canvas">

    <div id="game-overlay">

      <button class="start-btn" id="btn-game-start" onclick="realGameStart(); return false;">게임 시작 (START)</button>
    </div>
  </div>

    <div class="word-card" data-word="펩신" onclick="handleCardClick(this); return false;">펩신</div>
